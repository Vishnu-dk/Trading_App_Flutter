services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Kripa%40123
      POSTGRES_DB: trade_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports: 
      - "8000:8000"
    environment: 
      - DATABASE_URL=postgresql://postgres:Kripa%40123@db:5432/trade_db
    depends_on:
      - db

volumes:
  postgres_data: