services:

  backend:
    build : ./backend
    volumes:
      - ./backend:/app
    ports :
      - "8000:8000"
    environment :
      - DATABASE_URL="postgresql://postgres:Kripa%40123:db@5432/todo_db"
    depends_on :
      - db 
  db :
    image : postgres:16
    environment:
      POSTGRES_USER : postgres
      POSTGRES_PASSWORD : Kripa@123
      POSTGRES_DB : todo_db
      
    ports :
      - "5433:5432"
    volumes :
      - "postgres_data:/var/lib/postgresql/data"
volumes :
  postgres_data :